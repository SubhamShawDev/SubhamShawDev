name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman Contribution Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Minsu-Agrahari
          svg_out_path: dist/pacman-contribution-graph-dark.svg

      - name: Add Dark Background
        run: |
          sed -i 's/<svg/<svg style="background:#0d1117"/' dist/pacman-contribution-graph-dark.svg

      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}