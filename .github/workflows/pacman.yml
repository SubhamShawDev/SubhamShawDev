name: Generate Pacman

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman Contribution Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Minsu-Agrahari
          theme: github-dark
          background: "#0d1117"
          wall_color: "#58a6ff"
          food_color: "#f2cc60"
          pacman_color: "#ffd700"
          ghost_color: "#ff4d6d"

      - name: Push Pacman Graph
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}